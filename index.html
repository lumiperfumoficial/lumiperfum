<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiPerfum | Loja Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header" style="background: #ffdae0 !important; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; height: 80px; position: fixed; width: 100%; top: 0; z-index: 9999;">
    <div class="logo" style="flex: 1; font-weight: 800; font-size: 24px; color: #1c1917;">LUMI<span style="color: #d4a373;">PERFUM</span></div>
    
    <div class="box-busca" style="flex: 0 1 400px; margin: 0 20px;">
        <input type="text" id="input-busca" placeholder="🔍 Buscar perfume..." onkeyup="buscarPerfume()" style="width: 100%; padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6);">
    </div>

    <nav class="filtros" style="flex: 1; display: flex; justify-content: flex-end;">
        <button class="btn-filtro active" onclick="filtrar('todos')">Todos</button>
        <button class="btn-filtro" onclick="filtrar('masculino')">Masculino</button>
        <button class="btn-filtro" onclick="filtrar('feminino')">Feminino</button>
    </nav>
</header>

<section class="hero-banner" style="margin-top: 80px; text-align: center; padding: 60px 5%;">
    <div class="hero-content">
        <h1 style="text-shadow: 5px 5px 15px rgba(0,0,0,0.8); color: white; font-size: 38px;">Perfumes Que <span>Marcam</span> Presença.</h1>
        <p style="text-shadow: 3px 3px 10px rgba(0,0,0,0.8); color: white;">Descubra fragrâncias marcantes que transformam qualquer momento em uma experiência inesquecível.</p>
    </div>
</section>

<main class="container">
    <section id="produtos" class="product-grid"></section>

    <aside id="cart-sidebar" class="sidebar">
        <div class="cart-card">
            <div class="cart-header">
                <h2>Sua Sacola</h2>
                <button onclick="toggleCart()" class="close-cart">×</button>
            </div>
            
            <div id="lista-carrinho" class="cart-items"></div>

            <div class="cart-footer">
                <div class="payment-selection">
                    <label>Forma de Pagamento:</label>
                    <select id="metodo-pagamento" onchange="atualizarInterfacePagamento()">
                        <option value="Pix">Pix</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option> </select>
                </div>

                <div id="campo-parcelas" style="display: none; margin-top: 10px;">
                    <label>Quantidade de Parcelas:</label>
                    <select id="parcelas" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd;"></select>
                </div>

                <div class="total-row">
                    <span>Total:</span>
                    <strong id="total">R$ 0,00</strong>
                </div>
                <button class="btn-checkout" onclick="finalizarCompra()">Finalizar no WhatsApp</button>
            </div>
        </div>
    </aside>
</main>

<script src="script.js"></script>
<script>
    function atualizarInterfacePagamento() {
        const metodo = document.getElementById('metodo-pagamento').value;
        const divParcelas = document.getElementById('campo-parcelas');
        if (metodo === 'Cartão de Crédito') {
            divParcelas.style.display = 'block';
            gerarOpcoesParcelas();
        } else {
            divParcelas.style.display = 'none';
        }
    }

    function gerarOpcoesParcelas() {
        const totalTexto = document.getElementById('total').innerText;
        let valor = parseFloat(totalTexto.replace(/\D/g, "")) / 100;
        const select = document.getElementById('parcelas');
        select.innerHTML = '';
        if (!isNaN(valor) && valor > 0) {
            for (let i = 1; i <= 12; i++) {
                let valorParcela = (valor / i).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                let opt = document.createElement('option');
                opt.value = `${i}x de ${valorParcela}`;
                opt.text = `${i}x de ${valorParcela}`;
                select.appendChild(opt);
            }
        }
    }

    const targetNode = document.getElementById('total');
    const observer = new MutationObserver(() => {
        if (document.getElementById('metodo-pagamento').value === 'Cartão de Crédito') {
            gerarOpcoesParcelas();
        }
    });
    observer.observe(targetNode, { childList: true, characterData: true, subtree: true });

    function finalizarCompra() {
        const total = document.getElementById('total').innerText;
        const metodo = document.getElementById('metodo-pagamento').value;
        let msg = `Olá! Gostaria de finalizar meu pedido.\n\n*Total:* ${total}\n*Pagamento:* ${metodo}`;
        if (metodo === 'Cartão de Crédito') {
            msg += `\n*Parcelamento:* ${document.getElementById('parcelas').value}`;
        }
        window.open(`https://wa.me/5500999999999?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
