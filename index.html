<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiPerfum | Loja Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <div class="logo">LUMI<span>PERFUM</span></div>
    
    <div class="box-busca">
        <input type="text" id="input-busca" placeholder="🔍 Buscar perfume..." onkeyup="buscarPerfume()">
    </div>

    <nav class="filtros">
        <button class="btn-filtro active" data-tipo="todos" onclick="filtrar('todos')">Todos</button>
        <button class="btn-filtro" data-tipo="masculino" onclick="filtrar('masculino')">Masculino</button>
        <button class="btn-filtro" data-tipo="feminino" onclick="filtrar('feminino')">Feminino</button>
    </nav>
</header>

<main class="container">
    <section id="produtos" class="product-grid"></section>

    <aside id="cart-sidebar" class="sidebar">
        <div class="cart-card">
            <div class="cart-header">
                <h2>Sua Sacola</h2>
                <button onclick="toggleCart()" class="close-cart">×</button>
            </div>
            
            <div id="lista-carrinho" class="cart-items">
                <p class="empty-msg">Nenhum produto selecionado.</p>
            </div>

            <div class="cart-footer">
                <div class="payment-selection">
                    <label>Forma de Pagamento:</label>
                    <select id="metodo-pagamento" onchange="atualizarInterfacePagamento()">
                        <option value="Pix">Pix </option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                    </select>
                </div>

                <div id="campo-parcelas" style="display: none; margin-top: 10px;">
                    <label>Quantidade de Parcelas:</label>
                    <select id="parcelas" style="width: 100%; padding: 5px; border-radius: 4px;"></select>
                </div>

                <div class="total-row">
                    <span>Total:</span>
                    <strong id="total">R$ 0,00</strong>
                </div>
                <button class="btn-checkout" onclick="finalizarCompra()">Finalizar no WhatsApp</button>
            </div>
        </div>
    </aside>
</main>

<script>
    function atualizarInterfacePagamento() {
        const metodo = document.getElementById('metodo-pagamento').value;
        const divParcelas = document.getElementById('campo-parcelas');
        
        if (metodo === 'Cartão de Crédito') {
            divParcelas.style.display = 'block';
            gerarOpcoesParcelas();
        } else {
            divParcelas.style.display = 'none';
        }
    }

    function gerarOpcoesParcelas() {
        const totalElemento = document.getElementById('total');
        const selectParcelas = document.getElementById('parcelas');
        
        // LIMPEZA SEGURA: Remove tudo que não for número
        let apenasNumeros = totalElemento.innerText.replace(/\D/g, "");

        selectParcelas.innerHTML = ''; 

        if (!isNaN(valorNumerico) && valorNumerico > 0) {
            for (let i = 1; i <= 12; i++) {
                const valorDividido = valorNumerico / i;
                
                // Formata o valor para o padrão brasileiro de moeda
                const valorFormatado = valorDividido.toLocaleString('pt-BR', {
                    style: 'currency',
                    currency: 'BRL'
                });
                
                const option = document.createElement('option');
                option.value = `${i}x de ${valorFormatado}`;
                option.text = `${i}x de ${valorFormatado}`;
                selectParcelas.appendChild(option);
            }

    }

    function finalizarCompra() {
        const total = document.getElementById('total').innerText;
        const metodo = document.getElementById('metodo-pagamento').value;
        let msg = `Olá! Gostaria de finalizar meu pedido.\n\n*Total:* ${total}\n*Pagamento:* ${metodo}`;

        if (metodo === 'Cartão de Crédito') {
            const parcelaSelecionada = document.getElementById('parcelas').value;
            msg += `\n*Parcelamento:* ${parcelaSelecionada}`;
        }

        const numero = "5500999999999"; // COLOQUE SEU WHATSAPP AQUI
        window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

<script src="script.js"></script>
</body>
</html>
