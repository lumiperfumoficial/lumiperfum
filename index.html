<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiPerfum | Fragrâncias Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="tema-todos">

<header class="main-header">
    <div class="logo">LUMI<span>PERFUM</span></div>
    <nav class="filtros">
        <button class="btn-filtro active" data-tipo="todos" onclick="filtrar('todos')">Todos</button>
        <button class="btn-filtro" data-tipo="masculino" onclick="filtrar('masculino')">Masculino</button>
        <button class="btn-filtro" data-tipo="feminino" onclick="filtrar('feminino')">Feminino</button>
    </nav>
</header>

<main class="container">
    <section id="produtos" class="product-grid"></section>

    <aside class="sidebar">
        <div class="cart-card">
            <div class="cart-header">
                <h2>Carrinho</h2>
                <span id="cart-count">0 produtos</span>
            </div>
            
            <div id="lista-carrinho" class="cart-items">
                <p class="empty-msg">Nenhuma fragrância selecionada.</p>
            </div>

            <div class="cart-footer">
                <div class="total-row">
                    <span>Total Estimado:</span>
                    <strong id="total">R$ 0,00</strong>
                </div>
                <button class="btn-checkout" onclick="finalizarCompra()">
                    Finalizar via WhatsApp
                </button>
            </div>
        </div>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
