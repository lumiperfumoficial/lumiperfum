<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sua Loja | Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Sua Loja<span>.</span></h1>
  <p>Encontre a fragrância que define você</p>
</header>

<section class="filtros">
  <button class="active" onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('masculino')">Masculino</button>
  <button onclick="filtrar('feminino')">Feminino</button>
</section>

<main class="container">
  <section id="produtos" class="grid"></section>

  <aside class="carrinho-container">
    <section class="carrinho">
      <h2>Seu Carrinho</h2>
      <div id="lista-carrinho" class="carrinho-scroll"></div>
      <div class="carrinho-footer">
        <div class="total-box">
          <span>Total</span>
          <h3 id="total">R$ 0</h3>
        </div>
        <button class="btn-finalizar" onclick="finalizarCompra()">
          Finalizar no WhatsApp
        </button>
      </div>
    </section>
  </aside>
</main>

<script src="script.js"></script>
</body>
</html>
