<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiPerfum | Loja Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <div class="logo">LUMI<span>PERFUM</span></div>
    
    <div class="box-busca">
        <input type="text" id="input-busca" placeholder="🔍 Buscar perfume..." onkeyup="buscarPerfume()">
    </div>

    <nav class="filtros">
        <button class="btn-filtro active" data-tipo="todos" onclick="filtrar('todos')">Todos</button>
        <button class="btn-filtro" data-tipo="masculino" onclick="filtrar('masculino')">Masculino</button>
        <button class="btn-filtro" data-tipo="feminino" onclick="filtrar('feminino')">Feminino</button>
    </nav>
</header>

<section class="hero-banner">
    <div class="hero-glow"></div>
    <div class="hero-content">
        <span class="hero-badge"></span>
        <h1>Perfumes Que <span>Marcam</span> Presença.</h1>
        <p>Descubra fragrâncias marcantes que transformam qualquer momento em uma experiência inesquecível.</p>
    </div>
</section>

<main class="container">
    <section id="produtos" class="product-grid"></section>

    <aside id="cart-sidebar" class="sidebar">
        <div class="cart-card">
            <div class="cart-header">
                <h2>Sua Sacola</h2>
                <button onclick="toggleCart()" class="close-cart">×</button>
            </div>
            
            <div id="lista-carrinho" class="cart-items">
                <p class="empty-msg">Nenhum produto selecionado.</p>
            </div>

            <div class="cart-footer">
                <div class="payment-selection">
                    <label>Forma de Pagamento:</label>
                    <select id="metodo-pagamento" onchange="toggleParcelas()">
                        <option value="Pix">Pix </option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                    </select>
                </div>

                <div id="campo-parcelas" style="display: none; margin-top: 10px;">
                    <label>Quantidade de Parcelas:</label>
                    <select id="parcelas" style="width: 100%; padding: 5px; border-radius: 4px;">
                        <option value="1x">1x sem juros</option>
                        <option value="2x">2x sem juros</option>
                        <option value="3x">3x sem juros</option>
                        <option value="4x">4x sem juros</option>
                        <option value="5x">5x sem juros</option>
                        <option value="6x">6x sem juros</option>
                        <option value="10x">10x com juros</option>
                        <option value="12x">12x com juros</option>
                    </select>
                </div>

                <div class="total-row">
                    <span>Total:</span>
                    <strong id="total">R$ 0,00</strong>
                </div>
                <button class="btn-checkout" onclick="finalizarCompra()">Finalizar no WhatsApp</button>
            </div>
        </div>
    </aside>
</main>

<script>
    // Função para mostrar/esconder parcelas sem mudar nada no resto do seu código
    function toggleParcelas() {
        const metodo = document.getElementById('metodo-pagamento').value;
        const divParcelas = document.getElementById('campo-parcelas');
        divParcelas.style.display = (metodo === 'Cartão de Crédito') ? 'block' : 'none';
    }

    // Função para capturar os dados e enviar pro Whats
    function finalizarCompra() {
        const total = document.getElementById('total').innerText;
        const metodo = document.getElementById('metodo-pagamento').value;
        let msg = `Olá! Gostaria de encomendar os produtos.\n*Total:* ${total}\n*Pagamento:* ${metodo}`;

        if (metodo === 'Cartão de Crédito') {
            const qtdParcelas = document.getElementById('parcelas').value;
            msg += ` em ${qtdParcelas}`;
        }

        const numero = "5500999999999"; // Coloque seu número aqui
        window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
<script src="script.js"></script>
</body>
</html>
