<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiPerfum | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="tema-todos">

<header class="main-header">
    <div class="logo">LUMI<span>PERFUM</span></div>
    <nav class="filtros">
        <button class="btn-filtro active" onclick="filtrar('todos')">Todos</button>
        <button class="btn-filtro" onclick="filtrar('masculino')">Masculino</button>
        <button class="btn-filtro" onclick="filtrar('feminino')">Feminino</button>
    </nav>
</header>

<main class="container">
    <section id="produtos" class="product-grid"></section>
    <aside class="sidebar">
        <div class="cart-card">
            <h2>Carrinho</h2>
            <div id="lista-carrinho" class="cart-items"></div>
            <div class="cart-footer">
                <div style="display:flex; justify-content:space-between; margin: 20px 0;">
                    <span>Total:</span>
                    <strong id="total">R$ 0,00</strong>
                </div>
                <button class="btn-checkout" onclick="finalizarCompra()">Finalizar WhatsApp</button>
            </div>
        </div>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
