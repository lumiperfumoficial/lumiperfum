<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiPerfum | Loja Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header class="main-header">
    <div class="logo">LUMIPERFUM</div>
    
    <div class="box-busca">
        <input type="text" id="input-busca" placeholder="🔍 Buscar perfume..." onkeyup="buscarPerfume()">
    </div>

    <nav class="filtros">
        <button class="btn-filtro active" onclick="filtrar('todos', this)">Todos</button>
        <button class="btn-filtro" onclick="filtrar('masculino', this)">Masculino</button>
        <button class="btn-filtro" onclick="filtrar('feminino', this)">Feminino</button>
    </nav>
</header>

<section class="hero-banner">
    <div class="hero-content">
        <h1>Perfumes Que Marcam Presença.</h1>
        <p>Descubra fragrâncias marcantes que transformam qualquer momento em uma experiência inesquecível.</p>
        <button class="hero-btn" onclick="document.getElementById('produtos').scrollIntoView({behavior: 'smooth'})">VER CATÁLOGO</button>
    </div>
</section>

<main class="container">
    <section id="produtos" class="product-grid"></section>

    <aside id="cart-sidebar" class="sidebar">
        <div class="cart-header">
            <h2>Sua Sacola</h2>
            <button onclick="toggleCart()" class="close-cart">×</button>
        </div>
        <div id="lista-carrinho" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total:</span>
                <strong id="total">R$ 0,00</strong>
            </div>
            <button class="btn-checkout" onclick="finalizarCompra()">Finalizar no WhatsApp</button>
        </div>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
